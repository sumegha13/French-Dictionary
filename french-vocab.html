<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Français — Sumegha &amp; Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#2D8E7C; --teal-d:#1E6B5C; --teal-l:#E8F5F2;
  --cream:#FAFAF7; --white:#FFFFFF;
  --text:#2C2C2A; --muted:#6B6B66;
  --border:rgba(44,44,42,.12);
  --shadow:0 2px 12px rgba(44,44,42,.07);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* ─── HEADER ─── */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--teal);white-space:nowrap}
.prog-wrap{flex:1;min-width:120px}
.prog-bar{height:6px;background:var(--teal-l);border-radius:3px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s}
.prog-txt{font-size:11px;color:var(--muted)}
.mode-btn{padding:7px 14px;border:1.5px solid var(--teal);border-radius:20px;background:var(--white);color:var(--teal);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.mode-btn:hover{background:var(--teal-l)}
.mode-btn.kid{background:#FFF4E6;border-color:#F5A623;color:#D4820A}

/* ─── FILTERS ─── */
.filters{background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px}
.f-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.srch-wrap{position:relative;flex:1;min-width:160px}
.srch-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.srch{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--text)}
.srch:focus{outline:none;border-color:var(--teal)}
select.lvl{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream);color:var(--text);cursor:pointer}
.add-btn{padding:8px 14px;border:1.5px solid var(--teal);border-radius:8px;background:var(--teal);color:white;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
.add-btn:hover{background:var(--teal-d)}
.cats{display:flex;gap:6px;flex-wrap:wrap}
.cat{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--cream);color:var(--muted);transition:all .15s;font-family:inherit}
.cat:hover:not(.on){border-color:var(--teal);color:var(--teal)}
.cat.on{background:var(--teal);color:white;border-color:var(--teal)}

/* ─── MAIN ─── */
.main{padding:20px;max-width:1100px;margin:0 auto}

/* ─── ADULT TABLE ─── */
.sec-group{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sec-icon{font-size:17px}
.sec-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600}
.sec-count{font-size:11px;color:var(--muted);background:var(--cream);border:1px solid var(--border);border-radius:20px;padding:2px 8px}
table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
th{background:#F7F7F5;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 13px;text-align:left}
td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF9}
.fr{font-weight:600;color:var(--teal-d);font-size:15px}
.pron{color:var(--muted);font-style:italic;font-size:13px}
.ex{color:var(--muted);font-size:13px;max-width:220px}
.lv{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.lv-A1{background:#E8F5E9;color:#2E7D32}
.lv-A2{background:#E3F2FD;color:#1565C0}
.lv-B1{background:#FFF3E0;color:#E65100}
.abtn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px;transition:all .15s}
.abtn:hover{background:var(--teal-l);border-color:var(--teal)}
.lbtn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px;transition:transform .2s;line-height:1}
.lbtn:hover{transform:scale(1.25)}
.custom-badge{font-size:10px;background:#FFF4E6;color:#D4820A;border-radius:4px;padding:1px 5px;margin-left:6px;font-weight:600}

/* ─── KID CARDS ─── */
.kid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.flip-card{height:190px;perspective:1000px;cursor:pointer}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .42s ease}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.09)}
.flip-front{background:var(--white)}
.flip-back{transform:rotateY(180deg);background:var(--white)}
.c-emoji{font-size:34px;margin-bottom:6px;line-height:1}
.c-fr{font-size:17px;font-weight:600;margin-bottom:3px}
.c-hint{font-size:10px;color:var(--muted);margin-top:5px}
.c-en{font-size:14px;font-weight:500;margin-bottom:3px}
.c-pron{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:6px}
.c-acts{display:flex;gap:6px;margin-top:6px}
.c-lbtn,.c-abtn{background:none;border:none;cursor:pointer;font-size:18px;line-height:1;padding:2px}
.c-abtn{font-size:15px}
.c-top-bar{position:absolute;top:10px;right:10px}
.c-lbtn-top{background:none;border:none;cursor:pointer;font-size:16px;line-height:1}

/* ─── ADD PANEL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199;display:none}
.overlay.show{display:block}
.panel{position:fixed;top:0;right:0;width:340px;height:100vh;background:var(--white);box-shadow:-4px 0 30px rgba(0,0,0,.1);z-index:200;padding:24px;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto}
.panel.open{transform:translateX(0)}
.panel-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.close-x{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);line-height:1}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fi,.fs{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);background:var(--cream)}
.fi:focus,.fs:focus{outline:none;border-color:var(--teal)}
.sub-btn{width:100%;padding:11px;background:var(--teal);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.sub-btn:hover{background:var(--teal-d)}
.saved-note{font-size:12px;color:var(--teal);margin-top:8px;text-align:center;min-height:18px}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-em{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px}

/* ─── RESPONSIVE ─── */
@media(max-width:600px){
  .hdr{padding:10px 14px}
  .logo{font-size:17px}
  .main{padding:14px}
  .filters{padding:10px 14px}
  .prog-wrap,.prog-txt{display:none}
  .panel{width:100%}
  .kid-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">🇫🇷 Mon Français</div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-txt" id="progTxt">0 learned</div>
  </div>
  <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🎒 Kid Mode</button>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="f-row">
    <div class="srch-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="srch" id="srch" type="text" placeholder="Search French, English, pronunciation…" oninput="render()">
    </div>
    <select class="lvl" id="lvl" onchange="render()">
      <option value="">All levels</option>
      <option value="A1">A1 — Beginner</option>
      <option value="A2">A2 — Elementary</option>
      <option value="B1">B1 — Intermediate</option>
    </select>
    <!-- <button class="add-btn" onclick="openPanel()">＋ Add Word</button> -->
  </div>
  <div class="cats" id="cats"></div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

<!-- OVERLAY + ADD PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-title">Add New Word <button class="close-x" onclick="closePanel()">×</button></div>
  <div class="fg"><label class="fl">French word / phrase *</label><input class="fi" id="pFr" placeholder="e.g. pomme"></div>
  <div class="fg"><label class="fl">English meaning *</label><input class="fi" id="pEn" placeholder="e.g. apple"></div>
  <div class="fg"><label class="fl">Pronunciation</label><input class="fi" id="pPr" placeholder="e.g. pom"></div>
  <div class="fg"><label class="fl">Example sentence</label><input class="fi" id="pEx" placeholder="e.g. Je mange une pomme."></div>
  <div class="fg"><label class="fl">Emoji (for Kid mode)</label><input class="fi" id="pEm" placeholder="e.g. 🍎" maxlength="4"></div>
  <div class="fg">
    <label class="fl">Category</label>
    <select class="fs" id="pCat">
      <option value="food">🍽️ Food &amp; Eating</option>
      <option value="school">🏫 School</option>
      <option value="transport">🚆 Transport</option>
      <option value="family">👨‍👩‍👧‍👦 Family</option>
      <option value="home">🏠 Home &amp; Daily</option>
      <option value="hobbies">🎨 Hobbies</option>
      <option value="appearance">👤 Appearance</option>
      <option value="work">💼 Work &amp; Admin</option>
      <option value="phrases">💬 Phrases</option>
      <option value="verbs">⚡ Verbs</option>
      <option value="grammar">📖 Grammar</option>
    </select>
  </div>
  <div class="fg">
    <label class="fl">Level</label>
    <select class="fs" id="pLv">
      <option value="A1">A1 — Beginner</option>
      <option value="A2">A2 — Elementary</option>
      <option value="B1">B1 — Intermediate</option>
    </select>
  </div>
  <button class="sub-btn" onclick="addWord()">Save Word</button>
  <div class="saved-note" id="savedNote"></div>
</div>

<script>

// ═══════════════════════════════════════════

  {id:'home',     label:'🏠 Home & Daily'},

  {id:'transport',label:'🚆 Transport'},

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let kidMode = localStorage.getItem('kidMode') === '1';
let learned = new Set(JSON.parse(localStorage.getItem('learned')||'[]'));
let customWords = JSON.parse(localStorage.getItem('custom')||'[]');
let activeCat = 'all';

function allWords() {
  return [...BASE, ...customWords.map(w => ({...w, custom:true}))];
}

function filtered() {
  const q = document.getElementById('srch').value.trim().toLowerCase();
  const lv = document.getElementById('lvl').value;
  return allWords().filter(w => {
    const catOk = activeCat === 'all' || w.cat === activeCat;
    const lvOk = !lv || w.lv === lv;
    const qOk = !q ||
      w.fr.toLowerCase().includes(q) ||
      w.en.toLowerCase().includes(q) ||
      (w.pron||'').toLowerCase().includes(q) ||
      (w.ex||'').toLowerCase().includes(q);
    return catOk && lvOk && qOk;
  });
}

function toggleLearn(id, btn) {
  if(learned.has(id)) learned.delete(id);
  else learned.add(id);
  localStorage.setItem('learned', JSON.stringify([...learned]));
  if(btn) btn.textContent = learned.has(id) ? '⭐' : '☆';
  updateProgress();
}

function updateProgress() {
  const all = allWords();
  const cnt = all.filter(w => learned.has(w.fr)).length;
  const pct = all.length ? Math.round(cnt/all.length*100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = cnt + ' of ' + all.length + ' learned';
}

function speak(word) {
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'fr-FR'; u.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const words = filtered();
  const main = document.getElementById('main');

  if(!words.length) {
    main.innerHTML = '<div class="empty"><div class="empty-em">🔍</div><p>No words found — try a different search or category.</p></div>';
    return;
  }

  main.innerHTML = kidMode ? renderKid(words) : renderAdult(words);
  updateProgress();
}

function renderAdult(words) {
  // Group by category
  const groups = {};
  words.forEach(w => {
    if(!groups[w.cat]) groups[w.cat] = [];
    groups[w.cat].push(w);
  });

  return Object.entries(groups).map(([cat, ws]) => {
    const meta = CAT_META[cat] || {icon:'📝', label: cat};
    const rows = ws.map(w => {
      const star = learned.has(w.fr) ? '⭐' : '☆';
      const custom = w.custom ? '<span class="custom-badge">Mine</span>' : '';
      return `<tr>
        <td><span class="fr">${esc(w.fr)}</span>${custom}</td>
        <td>${esc(w.en)}</td>
        <td class="pron">${esc(w.pron||'')}</td>
        <td class="ex">${esc(w.ex||'')}</td>
        <td><span class="lv lv-${w.lv}">${w.lv}</span></td>
        <td><button class="abtn" onclick="speak('${esc(w.fr)}')" title="Play audio">🔊</button></td>
        <td><button class="lbtn" onclick="toggleLearn('${esc(w.fr)}', this)" title="Mark learned">${star}</button></td>
      </tr>`;
    }).join('');

    return `<div class="sec-group">
      <div class="sec-hdr">
        <span class="sec-icon">${meta.icon}</span>
        <span class="sec-title">${meta.label}</span>
        <span class="sec-count">${ws.length} words</span>
      </div>
      <table>
        <thead><tr>
          <th>French</th><th>English</th><th>Pronunciation</th>
          <th>Example</th><th>Level</th><th></th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

function renderKid(words) {
  const cards = words.map(w => {
    const star = learned.has(w.fr) ? '⭐' : '☆';
    const flipped = '';
    return `<div class="flip-card" id="fc-${hashId(w.fr)}" onclick="flipCard('${hashId(w.fr)}')">
      <div class="flip-inner">
        <div class="flip-front" style="border-top: 4px solid ${catColor(w.cat)}">
          <div class="c-top-bar"><button class="c-lbtn-top" onclick="event.stopPropagation();toggleLearn('${esc(w.fr)}', this)" title="Mark learned">${star}</button></div>
          <div class="c-emoji">${w.em||'📝'}</div>
          <div class="c-fr" style="color:${catColor(w.cat)}">${esc(w.fr)}</div>
          <div class="c-hint">tap to reveal</div>
        </div>
        <div class="flip-back" style="border-top: 4px solid ${catColor(w.cat)}">
          <div class="c-en">${esc(w.en)}</div>
          <div class="c-pron">${esc(w.pron||'')}</div>
          <div class="c-acts">
            <button class="c-abtn" onclick="event.stopPropagation();speak('${esc(w.fr)}')" title="Hear it">🔊</button>
            <button class="c-lbtn" onclick="event.stopPropagation();toggleLearn('${esc(w.fr)}', this)" title="Mark learned">${star}</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="kid-grid">${cards}</div>`;
}

function flipCard(id) {
  const el = document.getElementById('fc-'+id);
  if(el) el.classList.toggle('flipped');
}

function catColor(cat) {
  const colors = {
    grammar:'#4A90D9', verbs:'#7B61FF', family:'#E8845C',
    home:'#5CB85C', school:'#F5A623', transport:'#3B8EEA',
    food:'#E85C8A', appearance:'#9B59B6', hobbies:'#E8845C',
    phrases:'#2D8E7C', work:'#34495E'
  };
  return colors[cat] || '#2D8E7C';
}

function hashId(str) {
  return str.replace(/[^a-zA-Z0-9]/g, '_');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════
function toggleMode() {
  kidMode = !kidMode;
  localStorage.setItem('kidMode', kidMode ? '1' : '0');
  const btn = document.getElementById('modeBtn');
  btn.textContent = kidMode ? '📊 Adult Mode' : '🎒 Kid Mode';
  btn.classList.toggle('kid', kidMode);
  render();
}

function openPanel() {
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('savedNote').textContent = '';
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function addWord() {
  const fr = document.getElementById('pFr').value.trim();
  const en = document.getElementById('pEn').value.trim();
  if(!fr || !en) { document.getElementById('savedNote').textContent = '⚠️ French and English are required.'; return; }
  const w = {
    fr, en,
    pron: document.getElementById('pPr').value.trim(),
    ex:   document.getElementById('pEx').value.trim(),
    em:   document.getElementById('pEm').value.trim() || '📝',
    cat:  document.getElementById('pCat').value,
    lv:   document.getElementById('pLv').value,
    custom: true
  };
  customWords.push(w);
  localStorage.setItem('custom', JSON.stringify(customWords));
  ['pFr','pEn','pPr','pEx','pEm'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('savedNote').textContent = '✅ "' + fr + '" saved!';
  render();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(function init() {
  // Category tabs
  const catsEl = document.getElementById('cats');
  catsEl.innerHTML = CATS.map(c =>
    `<button class="cat${c.id==='all'?' on':''}" data-id="${c.id}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');

  // Mode button
  const modeBtn = document.getElementById('modeBtn');
  if(kidMode) { modeBtn.textContent = '📊 Study Mode'; modeBtn.classList.add('kid'); }

  render();
  updateProgress();
})();

function setCat(id) {
  activeCat = id;
  document.querySelectorAll('.cat').forEach(el => el.classList.toggle('on', el.dataset.id === id));
  render();
}
